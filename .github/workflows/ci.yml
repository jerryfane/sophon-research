name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON manifests
        run: |
          python3 -m json.tool .codex-plugin/plugin.json >/dev/null
          python3 -m json.tool .agents/plugins/marketplace.json >/dev/null
          python3 -m json.tool plugins/sophon-research/.codex-plugin/plugin.json >/dev/null

      - name: Compile Python
        run: |
          python3 -m py_compile bin/sophon-research
          python3 -m py_compile src/sophon_research/*.py
          python3 -m py_compile plugins/sophon-research/bin/sophon-research
          python3 -m py_compile plugins/sophon-research/src/sophon_research/*.py

      - name: Run unit tests
        run: python3 -m unittest discover -v

      - name: Smoke CLI help
        run: |
          bin/sophon-research --help >/dev/null
          bin/sophon-research version
          plugins/sophon-research/bin/sophon-research --help >/dev/null
          plugins/sophon-research/bin/sophon-research version

      - name: Check diff hygiene
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          elif git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            git diff --check "${{ github.event.before }}..HEAD"
          else
            git diff-tree --check --root -r HEAD
          fi
